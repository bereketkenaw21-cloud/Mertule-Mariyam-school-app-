<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule School Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#1e3a8a">
</head>
<body>
    <div id="splash">
        <h1 style="padding: 0 20px;">እንኳን ወደ መርጡለ ማሪያም School app በደህና መጣቹህ</h1>
        <div class="creator-tag">በ በረከት ቀናው የተዘጋጀ</div>
    </div>

    <div id="reg-page" class="hidden container">
        <div class="card">
            <h2 style="color:var(--main); margin-top:0;">የአባላት ምዝገባ</h2>
            <input type="text" id="fname" placeholder="ስም">
            <input type="text" id="lname" placeholder="የአባት ስም">
            <input type="tel" id="phone" placeholder="የቴሌ ስልክ (09.../07...)">
            <input type="number" id="age" placeholder="እድሜ">
            <select id="gender"><option value="">ፆታ</option><option value="ወንድ">ወንድ</option><option value="ሴት">ሴት</option></select>
            <select id="role" onchange="checkRole()">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">እርሰ መምህር / አስተዳደር</option>
            </select>
            <input type="password" id="code" class="hidden" placeholder="የምስጢር ኮድ ያስገቡ">
            <button class="btn-main" onclick="login()">ይግቡ</button>
        </div>
    </div>

    <div id="dashboard" class="hidden container">
        <div id="notice-board" class="hidden" style="background:#fff3cd; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #ffeeba;"></div>
        <div id="grade-view">
            <h3 style="color:var(--main);">የክፍል ደረጃዎች (2018 Curriculum)</h3>
            <div class="grade-grid">
                <div class="grade-box g9" onclick="showSubjects(9)"><h2>9</h2><p>Grade 9</p></div>
                <div class="grade-box g10" onclick="showSubjects(10)"><h2>10</h2><p>Grade 10</p></div>
                <div class="grade-box g11" onclick="showSubjects(11)"><h2>11</h2><p>Social/Natural</p></div>
                <div class="grade-box g12" onclick="showSubjects(12)"><h2>12</h2><p>Social/Natural</p></div>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:red; margin-top:30px; width:100%; font-weight:bold;">ሎግ አውት</button>
        </div>
        
        <div id="content-view" class="hidden">
            <button class="back-btn" onclick="goBack()">⬅ ተመለስ</button>
            <h4 id="title" style="color:var(--main); font-size:20px;"></h4>
            <div id="list"></div>
            
            <div id="upload-section" class="hidden card">
                <h5 style="margin-top:0;">ፋይል መጫኛ (መምህር/አስተዳደር)</h5>
                <input type="file" id="file-input" multiple>
                <textarea id="text-msg" placeholder="መልዕክት ይጻፉ..."></textarea>
                <button class="btn-main" onclick="alert('በተሳካ ሁኔታ ተልኳል!')">አፕሎድ</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden card" style="border: 2px solid var(--accent);">
            <h4 style="margin-top:0;">አጠቃላይ ማስታወቂያ ማስተላለፊያ</h4>
            <textarea id="global-msg" placeholder="ለሁሉም ተማሪ እና መምህር የሚደርስ..."></textarea>
            <button class="btn-orange" onclick="sendNotice()">ማስታወቂያ አስተላልፍ</button>
        </div>
    </div>

    <button id="installBtn" style="display:none; position:fixed; bottom:20px; width:90%; left:5%; background:#22c55e; color:white; padding:18px; border-radius:50px; border:none; font-weight:bold; z-index:3000;">አፑን ወደ ስልክህ ጫን (Install)</button>

    <script src="app.js"></script>
</body>
</html>
